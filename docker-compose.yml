services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=tofu_db
      - POSTGRES_USER=tofu_user
      - POSTGRES_PASSWORD=tofu_password
    ports:
      - "5432:5432"

  web:
    build: .
    command: >
      bash -c "sleep 5 && python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn tofu_n_millie_web.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://tofu_user:tofu_password@db:5432/tofu_db
      - ALLOWED_HOSTS=localhost,127.0.0.1,web
    depends_on:
      - db

volumes:
  postgres_data:
  media_volume:
  static_volume:
